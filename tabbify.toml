[app]
id          = "019e7903-0000-7000-8000-000000000d03"
name        = "hello-http"
description = "Minimal HTTP test app — same image runs as docker AND firecracker"

[build]
kind       = "docker"
context    = "."
dockerfile = "Dockerfile"
builder    = "ec2-prod"

[runtime]                        # defaults; a target may override `type`
type             = "docker"     # docker | firecracker | wasm-http
lifecycle        = "on_request"
idle_timeout_sec = 300
memory_mb        = 256
vcpus            = 1

[routes]
dynamic_prefixes = ["/"]

# Same image, two runtimes — the whole point of runtime-at-deploy.
[[deploy]]
supervisor = "ec2-prod"
runtime    = "docker"

# firecracker@thinkpad — temporarily disabled for the docker auto-deploy test;
# re-enable once the FC path is validated end-to-end on the ThinkPad.
